<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discrete Math — Mock Test (version corrigée)</title>
<style>
  :root {
    --bg: #f7f8fa;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1a202c;
    --muted: #718096;
    --accent: #3182ce;
    --green: #2f855a;
    --green-bg: #f0fff4;
    --red: #c53030;
    --red-bg: #fff5f5;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 0 0 60px 0;
  }
  header {
    background: linear-gradient(135deg, #2b6cb0, #3182ce);
    color: white;
    padding: 28px 20px;
    text-align: center;
  }
  header h1 { margin: 0 0 6px 0; font-size: 1.5rem; }
  header p { margin: 0; opacity: 0.92; font-size: 0.92rem; }
  .container { max-width: 780px; margin: 0 auto; padding: 20px; }
  .toolbar {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    padding: 12px 0;
    display: flex; gap: 10px; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .toolbar .btns { display:flex; gap:10px; }
  button {
    cursor: pointer; border: none; border-radius: 8px;
    padding: 9px 16px; font-size: 0.9rem; font-weight: 600;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }
  button:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #2c5282; }
  .btn-secondary { background: #edf2f7; color: #2d3748; }
  .btn-secondary:hover { background: #e2e8f0; }
  #scoreBox {
    font-weight: 700; font-size: 0.95rem; color: var(--text);
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 16px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  .card.correct { border-color: var(--green); box-shadow: 0 0 0 2px rgba(47,133,90,0.15); }
  .card.incorrect { border-color: var(--red); box-shadow: 0 0 0 2px rgba(197,48,48,0.15); }
  .q-num {
    display: inline-block; background: #edf2f7; color: #2d3748;
    font-size: 0.75rem; font-weight: 700; padding: 3px 10px; border-radius: 999px;
    margin-bottom: 8px;
  }
  .q-prompt { font-size: 0.98rem; line-height: 1.5; margin-bottom: 10px; white-space: pre-wrap; }
  .matrix {
    background: #f7fafc; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; font-family: "SF Mono", Consolas, monospace; font-size: 0.85rem;
    overflow-x: auto; margin: 10px 0;
  }
  .extra-visual { margin: 10px 0; }
  .options { display: flex; flex-direction: column; gap: 8px; margin: 10px 0; }
  .option {
    display: flex; align-items: flex-start; gap: 10px;
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
    cursor: pointer; transition: background 0.1s;
  }
  .option:hover { background: #f7fafc; }
  .option input { margin-top: 3px; flex-shrink: 0; }
  .option .opt-content { flex: 1; font-size: 0.92rem; }
  .option.is-correct-answer { background: var(--green-bg); border-color: var(--green); }
  .option.is-wrong-selected { background: var(--red-bg); border-color: var(--red); }
  .num-input {
    width: 100%; max-width: 260px; padding: 9px 12px; font-size: 0.95rem;
    border: 1px solid var(--border); border-radius: 8px; margin: 8px 0;
  }
  .q-footer { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
  .feedback {
    display: none; margin-top: 12px; padding: 12px 14px; border-radius: 8px;
    font-size: 0.88rem; line-height: 1.5;
  }
  .feedback.show { display: block; }
  .feedback.correct { background: var(--green-bg); color: #22543d; border: 1px solid #9ae6b4; }
  .feedback.incorrect { background: var(--red-bg); color: #742a2a; border: 1px solid #feb2b2; }
  .feedback .verdict { font-weight: 700; margin-bottom: 4px; }
  .feedback .correct-answer { font-style: italic; margin: 4px 0; }
  svg { background: white; }
  #finalScore {
    text-align: center; padding: 20px; margin-top: 20px;
    background: white; border-radius: 12px; border: 1px solid var(--border);
    display: none;
  }
  #finalScore.show { display: block; }
  #finalScore .big { font-size: 2rem; font-weight: 800; color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>Discrete Math — Mock Test (version corrigée)</h1>
  <p>Réponds à chaque question puis clique sur <b>Submit</b> pour voir la correction et l'explication.</p>
</header>

<div class="container">
  <div class="toolbar">
    <div id="scoreBox">0 / 30 vérifiées</div>

    </div>
  </div>

  <div id="quiz"></div>

  <div id="finalScore">

</div>

</text><circle cx=\"255\" cy=\"150\" r=\"17\" fill=\"#ffe066\" stroke=\"#333\" stroke-width=\"1.5\"/><text x=\"255\" y=\"155.0\" font-size=\"13\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial\">6</text></svg>", "correct": false}], "explanation": "Chaque valeur non nulle W[i][j] de la matrice est un arc orienté i→j de poids W[i][j]. Ici : 1→2(14), 1→3(6), 3→4(3), 3→5(3), 3→6(4), 4→6(2), 5→2(9), 5→6(6). Seul le graphe surligné respecte exactement ces 8 arcs et leurs poids (les autres modifient un poids en rouge)."}, {"num": 2, "type": "number", "prompt": "Consider the network below where the value on each arc is the capacity, s is the source, t is the sink. The maximum flow value of the network is:", "extra": "<svg viewBox=\"0 0 320 290\" width=\"100%\" style=\"max-width:380px;display:block;margin:8px auto\" xmlns=\"http://www.w3.org/2000/svg\"><defs><marker id=\"arrow\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto-start-reverse\"><path d=\"M0,0L10,5L0,10z\" fill=\"#4a5568\"/></marker></defs><line x1=\"53.3\" y1=\"139.4\" x2=\"146.7\" y2=\"65.6\" stroke=\"#4a5568\" stroke-width=\"1.8\" marker-end=\"url(#arrow)\"/><rect x=\"90.0\" y=\"93.5\" width=\"20\" height=\"16\" fill=\"white\" opacity=\"0.85\" rx=\"3\"/><text x=\"100.0\" y=\"106.5\" font-size=\"12\" text-anchor=\"middle\" fill=\"#4a5568\" font-family=\"Arial\">10</text><line x1=\"53.3\" y1=\"160.6\" x2=\"146.7\" y2=\"234.4\" stroke=\"#4a5568\" stroke-width=\"1.8\" marker-end=\"url(#arrow)\"/><rect x=\"90.0\" y=\"188.5\" width=\"20\" height=\"16\" fill=\"white\" opacity=\"0.85\" rx=\"3\"/><text x=\"100.0\" y=\"201.5\" font-size=\"12\" text-anchor=\"middle\" fill=\"#4a5568\" font-family=\"Arial\">5</text><line x1=\"173.3\" y1=\"65.6\" x2=\"266.7\" y2=\"139.4\" stroke=\"#4a5568\" stroke-width=\"1.8\" marker-end=\"url(#arrow)\"/><rect x=\"210.0\" y=\"93.5\" width=\"20\" height=\"16\" fill=\"white\" opacity=\"0.85\" rx=\"3\"/><text x=\"220.0\" y=\"106.5\" font-size=\"12\" text-anchor=\"middle\" fill=\"#4a5568\" font-family=\"Arial\">10</text><line x1=\"173.3\" y1=\"234.4\" x2=\"266.7\" y2=\"160.6\" stroke=\"#4a5568\" stroke-width=\"1.8\" marker-end=\"url(#arrow)\"/><rect x=\"210.0\" y=\"188.5\" width=\"20\" height=\"16\" fill=\"white\" opacity=\"0.85\" rx=\"3\"/><text x=\"220.0\" y=\"201.5\" font-size=\"12\" text-anchor=\"middle\" fill=\"#4a5568\" font-family=\"Arial\">10</text><line x1=\"160.0\" y1=\"72.0\" x2=\"160.0\" y2=\"228.0\" stroke=\"#4a5568\" stroke-width=\"1.8\" marker-end=\"url(#arrow)\"/><rect x=\"150.0\" y=\"141.0\" width=\"20\" height=\"16\" fill=\"white\" opacity=\"0.85\" rx=\"3\"/><text x=\"160.0\" y=\"154.0\" font-size=\"12\" text-anchor=\"middle\" fill=\"#4a5568\" font-family=\"Arial\">15</text><circle cx=\"40\" cy=\"150\" r=\"17\" fill=\"#ffe066\" stroke=\"#333\" stroke-width=\"1.5\"/><text x=\"40\" y=\"155.0\" font-size=\"13\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial\">s</text><circle cx=\"160\" cy=\"55\" r=\"17\" fill=\"#ffe066\" stroke=\"#333\" stroke-width=\"1.5\"/><text x=\"160\" y=\"60.0\" font-size=\"13\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial\">a</text><circle cx=\"160\" cy=\"245\" r=\"17\" fill=\"#ffe066\" stroke=\"#333\" stroke-width=\"1.5\"/><text x=\"160\" y=\"250.0\" font-size=\"13\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial\">b</text><circle cx=\"280\" cy=\"150\" r=\"17\" fill=\"#ffe066\" stroke=\"#333\" stroke-width=\"1.5\"/><text x=\"280\" y=\"155.0\" font-size=\"13\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial\">t</text></svg>", "answer": 15, "explanation": "Théorème max-flow / min-cut : la coupe S={s}, T={a,b,t} a une capacité de c(s,a)+c(s,b) = 10+5 = 15, et c'est la coupe minimale (vérifié en comparant à toutes les autres coupes possibles). Le flot maximal est donc égal à 15."}, {"num": 3, "type": "single", "prompt": "Consider an undirected graph G=(V,E), where the vertex set is V={1,2,3,4,5,6} and the edge set is E={(1,2),(1,3),(1,6),(2,3),(2,5),(2,6),(4,5),(4,6),(5,6)}. Question: Is G a complete graph?", "extra": "", "options": [{"html": "No", "correct": true}, {"html": "Yes", "correct": false}], "explanation": "Un graphe complet K6 doit avoir C(6,2) = 15 arêtes. G n'en a que 9 (il manque par exemple (1,4), (1,5), (2,4), (3,4), (3,5), (3,6)). G n'est donc pas complet."}, {"num": 4, "type": "single", "prompt": "Consider the undirected graph G=(V,E) with V={A,B,C,D} and E={AB,BC,CD,DA,AC,BD}. Does G have an Euler cycle?", "extra": "", "options": [{"html": "Yes", "correct": false}, {"html": "No", "correct": true}], "explanation": "Les 6 arêtes données forment K4 (toutes les paires sont reliées). Un cycle eulérien existe ssi le graphe est connexe et tous les degrés sont pairs. Dans K4, chaque sommet a un degré de 3 (impair) → pas de cycle eulérien."}, {"num": 5, "type": "sequence", "prompt": "Consider a directed weighted graph with 5 vertices V = {1,2,3,4,5}. The weight matrix W is given below (W[i][j]=0 means no direct edge from i to j). Using Dijkstra's algorithm (ties broken by lexicographic order 1,2,3,4,5), find the shortest-path distance from vertex 1 to all remaining vertices. Determine the order of the vertices in which the algorithm finds the shortest path from 1 to them.", "extra": "<pre class=\"matrix\">      1    2    3    4    5\n1     0   10    3    0    0\n2     0    0    1    2    0\n3     0    4    0    8    2\n4     0    0    0    0    7\n5     0    0    0    9    0</pre>", "seq_full": [1, 3, 5, 2, 4], "seq_short": [3, 5, 2, 4], "explanation": "Dijkstra depuis 1 : d(1)=0 → finalise 3 (d=3) → finalise 5 (d=3+2=5) → finalise 2 (d=min(10,3+4)=7) → finalise 4 (d=min(3+8,7+2)=9). Ordre de découverte des sommets restants : 3, 5, 2, 4 (ou 1, 3, 5, 2, 4 en comptant le départ)."}, {"num": 6, "type": "single", "prompt": "A delivery person starts from the store (point 1), must visit three delivery points 2, 3, and 4 exactly once, and then return to the store. Find the route with the minimum total distance for the following cost matrix c(i,j):", "extra": "<pre class=\"matrix\">      1    2    3    4\n1     0    3    2    4\n2     1    0    5    3\n3     2    3    0    7\n4     1    1    3    0</pre>", "options": [{"html": "1 – 4 – 2 – 3 – 1", "correct": false}, {"html": "1 – 3 – 2 – 4 – 1", "correct": true}, {"html": "1 – 4 – 2 – 3 – 1 (bis)", "correct": false}, {"html": "1 – 2 – 3 – 4 – 1", "correct": false}, {"html": "None of the given choices above is correct.", "correct": false}], "explanation": "Les 6 trajets possibles : 1-2-3-4-1=16, 1-2-4-3-1=11, 1-3-2-4-1=9, 1-3-4-2-1=11, 1-4-2-3-1=12, 1-4-3-2-1=11. Le minimum est 9 via 1–3–2–4–1."}, {"num": 7, "type": "single", "prompt": "Given an undirected graph G, all edges of G have the same weight. If we want to find the shortest path between any two vertices of the graph, which of the following algorithms is the most efficient?", "extra": "", "options": [{"html": "Bellman - Ford", "correct": false}, {"html": "Floyd - Warshall", "correct": false}, {"html": "Depth First Search (DFS)", "correct": false}, {"html": "Breadth First Search (BFS)", "correct": true}, {"html": "Dijkstra", "correct": false}], "explanation": "Avec des poids uniformes, BFS trouve les plus courts chemins en O(V+E), ce qui est plus efficace que Dijkstra/Bellman-Ford/Floyd-Warshall, conçus pour des poids généraux."}, {"num": 8, "type": "number", "prompt": "An undirected simple graph has 20 vertices. What is the minimum number of edges needed to guarantee that it contains a cycle?", "extra": "", "answer": 20, "explanation": "Un graphe simple sans cycle (une forêt) a au plus n−1 arêtes. Avec 20 sommets, 19 arêtes peuvent encore former un arbre sans cycle. La 20e arête crée nécessairement un cycle."}, {"num": 9, "type": "single", "prompt": "Consider the undirected graph G=(V,E) with V={A,B,C,D} and E={AB,BC,CD,DA}. Does G have an Euler cycle?", "extra": "", "options": [{"html": "No", "correct": false}, {"html": "Yes", "correct": true}], "explanation": "G est le cycle A-B-C-D-A. Tous les degrés valent 2 (pair) et le graphe est connexe → un cycle eulérien existe (le cycle lui-même parcourt les 4 arêtes une seule fois)."}, {"num": 10, "type": "single", "prompt": "Among any 10 integers, there exist two integers whose difference is divisible by 9. This statement is:", "extra": "", "options": [{"html": "Always false", "correct": false}, {"html": "Sometimes true", "correct": false}, {"html": "True only if the integers are consecutive", "correct": false}, {"html": "Always true", "correct": true}], "explanation": "Principe des tiroirs : il n'y a que 9 restes possibles modulo 9 (0 à 8). Avec 10 entiers, deux doivent partager le même reste, donc leur différence est divisible par 9. Toujours vrai."}, {"num": 11, "type": "number", "prompt": "Using the same weight matrix as before, apply Dijkstra's algorithm from vertex 2 (ties broken lexicographically). What is the third vertex where the algorithm finds the shortest path from 2 to it?", "extra": "<pre class=\"matrix\">      1    2    3    4    5\n1     0   10    3    0    0\n2     0    0    1    2    0\n3     0    4    0    8    2\n4     0    0    0    0    7\n5     0    0    0    9    0</pre>", "answer": 5, "explanation": "Dijkstra depuis 2 : d(2)=0 → finalise 3 (d=1, 1er) → finalise 4 (d=2, 2e) → finalise 5 (d=3, 3e). Le sommet 1 est inaccessible depuis 2. Le 3e sommet trouvé est donc le sommet 5."}, {"num": 12, "type": "number", "prompt": "Each menu for a meal at the restaurant ABC consists of 3 dishes: appetizer, main dish and dessert. The restaurant has 5 types of appetizer, 3 types of main dish and 4 types of dessert. How many ways can a person choose the menu?", "extra": "", "answer": 60, "explanation": "Principe multiplicatif : 5 × 3 × 4 = 60."}, {"num": 13, "type": "number", "prompt": "How many ways are there to distribute 30 identical cookies among 10 students so that each student receives at least 2 and at most 5 cookies?", "extra": "", "answer": 44803, "explanation": "Poser y_i = x_i−2 (0≤y_i≤3), somme y_i = 10. Inclusion-exclusion : C(19,9) − 10·C(15,9) + 45·C(11,9) = 92378 − 50050 + 2475 = 44803."}, {"num": 14, "type": "number", "prompt": "What is the minimum number of students required in a class to guarantee that at least 4 students were born in the same month?", "extra": "", "answer": 37, "explanation": "Pire cas : 3 étudiants par mois × 12 mois = 36 sans 4 dans un même mois. Le 37e étudiant force un 4e dans un mois."}, {"num": 15, "type": "number", "prompt": "Six different people {A,B,C,D,E,F} are to be seated around a round table. There is exactly one special seat where only A can sit. In how many different ways can the people be seated if arrangements that differ only by rotation are considered the same?", "extra": "", "answer": 120, "explanation": "Puisque seul A peut occuper le siège spécial, A y est fixé (plus de liberté de rotation). Les 5 personnes restantes s'installent dans les 5 sièges restants, désormais distinguables par rapport à A : 5! = 120."}, {"num": 16, "type": "single", "prompt": "A box contains red, blue, and green balls. What is the minimum number of balls that must be drawn to guarantee that two balls have the same color?", "extra": "", "options": [{"html": "Cannot be determined", "correct": false}, {"html": "3", "correct": false}, {"html": "2", "correct": false}, {"html": "4", "correct": true}], "explanation": "Avec 3 couleurs, le pire cas tire une balle de chaque couleur (3 balles, toutes différentes) sans paire. La 4e balle forme nécessairement une paire (principe des tiroirs)."}, {"num": 17, "type": "single", "prompt": "Consider the following flow network, where the number on each edge denotes the capacity of the edge. Which of the following pairs of sets (S,T) is the minimum cut of this network?", "extra": "<svg viewBox=\"0 0 320 290\" width=\"100%\" style=\"max-width:380px;display:block;margin:8px auto\" xmlns=\"http://www.w3.org/2000/svg\"><defs><marker id=\"arrow\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto-start-reverse\"><path d=\"M0,0L10,5L0,10z\" fill=\"#4a5568\"/></marker></defs><line x1=\"53.3\" y1=\"139.4\" x2=\"146.7\" y2=\"65.6\" stroke=\"#4a5568\" stroke-width=\"1.8\" marker-end=\"url(#arrow)\"/><rect x=\"90.0\" y=\"93.5\" width=\"20\" height=\"16\" fill=\"white\" opacity=\"0.85\" rx=\"3\"/><text x=\"100.0\" y=\"106.5\" font-size=\"12\" text-anchor=\"middle\" fill=\"#4a5568\" font-family=\"Arial\">10</text><line x1=\"53.3\" y1=\"160.6\" x2=\"146.7\" y2=\"234.4\" stroke=\"#4a5568\" stroke-width=\"1.8\" marker-end=\"url(#arrow)\"/><rect x=\"90.0\" y=\"188.5\" width=\"20\" height=\"16\" fill=\"white\" opacity=\"0.85\" rx=\"3\"/><text x=\"100.0\" y=\"201.5\" font-size=\"12\" text-anchor=\"middle\" fill=\"#4a5568\" font-family=\"Arial\">5</text><line x1=\"173.3\" y1=\"65.6\" x2=\"266.7\" y2=\"139.4\" stroke=\"#4a5568\" stroke-width=\"1.8\" marker-end=\"url(#arrow)\"/><rect x=\"210.0\" y=\"93.5\" width=\"20\" height=\"16\" fill=\"white\" opacity=\"0.85\" rx=\"3\"/><text x=\"220.0\" y=\"106.5\" font-size=\"12\" text-anchor=\"middle\" fill=\"#4a5568\" font-family=\"Arial\">10</text><line x1=\"173.3\" y1=\"234.4\" x2=\"266.7\" y2=\"160.6\" stroke=\"#4a5568\" stroke-width=\"1.8\" marker-end=\"url(#arrow)\"/><rect x=\"210.0\" y=\"188.5\" width=\"20\" height=\"16\" fill=\"white\" opacity=\"0.85\" rx=\"3\"/><text x=\"220.0\" y=\"201.5\" font-size=\"12\" text-anchor=\"middle\" fill=\"#4a5568\" font-family=\"Arial\">10</text><line x1=\"160.0\" y1=\"72.0\" x2=\"160.0\" y2=\"228.0\" stroke=\"#4a5568\" stroke-width=\"1.8\" marker-end=\"url(#arrow)\"/><rect x=\"150.0\" y=\"141.0\" width=\"20\" height=\"16\" fill=\"white\" opacity=\"0.85\" rx=\"3\"/><text x=\"160.0\" y=\"154.0\" font-size=\"12\" text-anchor=\"middle\" fill=\"#4a5568\" font-family=\"Arial\">15</text><circle cx=\"40\" cy=\"150\" r=\"17\" fill=\"#ffe066\" stroke=\"#333\" stroke-width=\"1.5\"/><text x=\"40\" y=\"155.0\" font-size=\"13\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial\">s</text><circle cx=\"160\" cy=\"55\" r=\"17\" fill=\"#ffe066\" stroke=\"#333\" stroke-width=\"1.5\"/><text x=\"160\" y=\"60.0\" font-size=\"13\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial\">a</text><circle cx=\"160\" cy=\"245\" r=\"17\" fill=\"#ffe066\" stroke=\"#333\" stroke-width=\"1.5\"/><text x=\"160\" y=\"250.0\" font-size=\"13\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial\">b</text><circle cx=\"280\" cy=\"150\" r=\"17\" fill=\"#ffe066\" stroke=\"#333\" stroke-width=\"1.5\"/><text x=\"280\" y=\"155.0\" font-size=\"13\" text-anchor=\"middle\" font-weight=\"bold\" font-family=\"Arial\">t</text></svg>", "options": [{"html": "S={s,a,b} and T={t}", "correct": false}, {"html": "S={s,b} and T={a,t}", "correct": false}, {"html": "S={s} and T={a,b,t}", "correct": true}, {"html": "S={s,a} and T={b,t}", "correct": false}, {"html": "None of the given choices above is correct.", "correct": false}], "explanation": "Capacités des coupes : {s}/{a,b,t}=10+5=15 ; {s,a}/{b,t}=c(a,t)+c(a,b)+c(s,b)=10+15+5=30 ; {s,b}/{a,t}=c(s,a)+c(b,t)=10+10=20 ; {s,a,b}/{t}=c(a,t)+c(b,t)=20. Le minimum (15) correspond à S={s}, T={a,b,t} — cohérent avec le flot maximal de la Q2."}, {"num": 18, "type": "number", "prompt": "Undirected simple graph G with vertex set V={1,2,...,10}. In this graph, for every pair of vertices, there is an edge connecting them (i.e. G is complete, K10). What is the number of simple paths starting from vertex 1, passing through all the remaining vertices, and ending at vertex 10?", "extra": "", "answer": 40320, "explanation": "Graphe complet K10, chemin hamiltonien de 1 à 10 : les 8 sommets intermédiaires {2,...,9} peuvent être ordonnés librement : 8! = 40320."}, {"num": 19, "type": "number", "prompt": "There are 4 types of items (1,2,3,4) with weights 5,3,2,4 and values 10,5,3,6. Choose a non-negative number of each type so that total weight ≤ 14 and total value is maximized. What is the maximum total value?", "extra": "", "answer": 26, "explanation": "Programmation dynamique (sac à dos non borné, capacité 14) : la valeur maximale est 26, atteinte par ex. avec 2×objet1 (poids5,valeur10) + 2×objet3 (poids2,valeur3) = poids 14, valeur 26."}, {"num": 20, "type": "number", "prompt": "How many ways are there to choose a class monitor and a secretary from a class of 20 students? (the secretary and the class monitor must be two different students)", "extra": "", "answer": 380, "explanation": "Deux rôles distincts, ordre important : 20 choix pour le délégué × 19 pour le secrétaire = 380."}, {"num": 21, "type": "number", "prompt": "How many binary strings of length 5 do not contain two consecutive 1s?", "extra": "", "answer": 13, "explanation": "Suite de type Fibonacci : a(0)=1, a(1)=2, a(n)=a(n−1)+a(n−2) → a(2)=3, a(3)=5, a(4)=8, a(5)=13."}, {"num": 22, "type": "number", "prompt": "How many ways are there to divide 25 identical balls among 8 boxes such that each box contains at most 6 balls?", "extra": "", "answer": 392848, "explanation": "Solutions de x1+...+x8=25 avec 0≤xi≤6, par inclusion-exclusion : C(32,7) − 8·C(25,7) + 28·C(18,7) − 56·C(11,7) = 3365856 − 3845600 + 891072 − 18480 = 392848."}, {"num": 23, "type": "number", "prompt": "A delivery person starts from the store (point 1), must visit three delivery points 2, 3, and 4 exactly once, and then return to the store. Find the minimum total distance for the following cost matrix c(i,j):", "extra": "<pre class=\"matrix\">      1    2    3    4\n1     0    3    2    4\n2     1    0    5    3\n3     2    3    0    7\n4     1    1    3    0</pre>", "answer": 9, "explanation": "Même matrice qu'à la question 6 : le trajet minimal 1-3-2-4-1 coûte 2+3+3+1 = 9."}, {"num": 24, "type": "number", "prompt": "Consider a graph with 5 vertices V={1,2,3,4,5}. The weight matrix W is given below. What is the total weight of the Minimum Spanning Tree (MST) of the given graph?", "extra": "<pre class=\"matrix\">      1    2    3    4    5\n1     0    2    0    6    0\n2     2    0    3    8    5\n3     0    3    0    0    7\n4     6    8    0    0    9\n5     0    5    7    9    0</pre>", "answer": 16, "explanation": "Kruskal (arêtes triées) : (1,2,2), (2,3,3), (2,5,5), (1,4,6) connectent les 5 sommets sans cycle → poids total = 2+3+5+6 = 16."}, {"num": 25, "type": "number", "prompt": "How many ways are there to choose 5 elements from the set {1,2,…,10} such that at least two selected elements are consecutive?", "extra": "", "answer": 246, "explanation": "Total C(10,5)=252. Sans aucune paire consécutive (formule C(n−k+1,k)) : C(6,5)=6. Avec au moins une paire consécutive : 252−6 = 246."}, {"num": 26, "type": "multi", "prompt": "Which statement(s) below is/are correct?", "extra": "", "options": [{"html": "If the graph G is a tree, then there is only one path between every pair of vertices.", "correct": true}, {"html": "If there is only one path between every pair of vertices in the graph G, then G is a tree.", "correct": true}, {"html": "Every tree is a connected graph.", "correct": true}, {"html": "Every connected graph is a tree.", "correct": false}], "explanation": "A: vrai (propriété fondamentale des arbres). B: vrai (réciproque également vraie : un chemin unique entre chaque paire implique connexité + acyclicité = arbre). C: vrai (par définition). D: faux (un graphe connexe peut contenir des cycles, ex. un simple cycle)."}, {"num": 27, "type": "single", "prompt": "Given the graph G (below). Which of the following graphs is NOT a subgraph of G?", "extra": "<svg viewBox=\"0 0 400 225\" width=\"100%\" style=\"max-width:380px;display:block;margin:8px auto\" xmlns=\"http://www.w3.org/2000/svg\"><defs><marker id=\"arrow\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto-start-reverse\"><path d=\"M0,0L10,5L0,10z\" fill=\"#4a5568\"/></marker></defs><line x1=\"44.0\" const quizEl = document.getElementById('quiz');

function normalizeNum(str) {
  if (str === null || str === undefined) return null;
  const cleaned = String(str).replace(',', '.').trim();
  if (cleaned === '') return null;
  const n = Number(cleaned);
  return isNaN(n) ? null : n;
}

function extractInts(str) {
  if (!str) return [];
  const matches = str.match(/-?\d+/g);
  return matches ? matches.map(Number) : [];
}

function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) return false;
  return true;
}

function renderOption(qIdx, oIdx, opt, type) {
  const inputType = type === 'multi' ? 'checkbox' : 'radio';
  const name = `q${qIdx}`;
  const isHtmlBlock = opt.html.trim().startsWith('<svg');
  return `
    <label class="option" data-oidx="${oIdx}">
      <input type="${inputType}" name="${name}" value="${oIdx}">
      <span class="opt-content">${isHtmlBlock ? opt.html : opt.html}</span>
    </label>
  `;
}

function renderQuestion(q, qIdx) {
  let bodyHtml = '';

  if (q.type === 'single' || q.type === 'multi') {
    bodyHtml += `<div class="options">`;
    q.options.forEach((opt, oIdx) => {
      bodyHtml += renderOption(qIdx, oIdx, opt, q.type);
    });
    bodyHtml += `</div>`;
  } else if (q.type === 'number') {
    bodyHtml += `<input type="text" inputmode="decimal" class="num-input" id="input-${qIdx}" placeholder="Ta réponse (nombre)">`;
  } else if (q.type === 'sequence') {
    bodyHtml += `<input type="text" class="num-input" id="input-${qIdx}" placeholder="Ex: 3, 5, 2, 4" style="max-width:400px">`;
  }

  const extraHtml = q.extra ? `<div class="extra-visual">${q.extra}</div>` : '';

  return `
    <div class="card" id="card-${qIdx}">
      <div class="q-num">Question ${q.num}</div>
      <div class="q-prompt">${q.prompt}</div>
      ${extraHtml}
      ${bodyHtml}
      <div class="q-footer">
        <button class="btn-primary" onclick="checkQuestion(${qIdx})">Submit</button>
      </div>
      <div class="feedback" id="feedback-${qIdx}"></div>
    </div>
  `;
}

function getCorrectOptionsText(q) {
  return q.options.filter(o => o.correct).map(o => o.html).filter(h => !h.trim().startsWith('<svg'));
}

function checkQuestion(qIdx) {
  const q = QUESTIONS[qIdx];
  const card = document.getElementById(`card-${qIdx}`);
  const feedback = document.getElementById(`feedback-${qIdx}`);
  let isCorrect = false;
  let userAnswerDesc = '';

  if (q.type === 'single') {
    const selected = card.querySelector(`input[name="q${qIdx}"]:checked`);
    card.querySelectorAll('.option').forEach(o => o.classList.remove('is-correct-answer','is-wrong-selected'));
    if (selected) {
      const oIdx = parseInt(selected.value);
      isCorrect = q.options[oIdx].correct;
      if (!isCorrect) {
        selected.closest('.option').classList.add('is-wrong-selected');
      }
    }
    q.options.forEach((opt, oIdx) => {
      if (opt.correct) {
        card.querySelector(`.option[data-oidx="${oIdx}"]`).classList.add('is-correct-answer');
      }
    });
  } else if (q.type === 'multi') {
    const checked = Array.from(card.querySelectorAll(`input[name="q${qIdx}"]:checked`)).map(el => parseInt(el.value));
    card.querySelectorAll('.option').forEach(o => o.classList.remove('is-correct-answer','is-wrong-selected'));
    const correctIdxs = q.options.map((o,i) => o.correct ? i : null).filter(i => i !== null);
    isCorrect = checked.length === correctIdxs.length && checked.every(i => correctIdxs.includes(i));
    q.options.forEach((opt, oIdx) => {
      const el = card.querySelector(`.option[data-oidx="${oIdx}"]`);
      if (opt.correct) el.classList.add('is-correct-answer');
      else if (checked.includes(oIdx)) el.classList.add('is-wrong-selected');
    });
  } else if (q.type === 'number') {
    const input = document.getElementById(`input-${qIdx}`);
    const val = normalizeNum(input.value);
    isCorrect = val !== null && Math.abs(val - q.answer) < 0.001;
    userAnswerDesc = input.value;
  } else if (q.type === 'sequence') {
    const input = document.getElementById(`input-${qIdx}`);
    const nums = extractInts(input.value);
    isCorrect = arraysEqual(nums, q.seq_full) || arraysEqual(nums, q.seq_short);
    userAnswerDesc = input.value;
  }

  card.classList.remove('correct', 'incorrect');
  card.classList.add(isCorrect ? 'correct' : 'incorrect');

  let answerLine = '';
  if (q.type === 'number') {
    answerLine = `<div class="correct-answer">Réponse correcte : <b>${q.answer}</b></div>`;
  } else if (q.type === 'sequence') {
    answerLine = `<div class="correct-answer">Réponse correcte : <b>${q.seq_short.join(' → ')}</b> (à partir du sommet de départ : ${q.seq_full.join(' → ')})</div>`;
  } else if (q.type === 'multi') {
    const correctTexts = q.options.filter(o=>o.correct).map((o,i)=>`(${i+1})`).join(', ');
  }

  feedback.className = 'feedback show ' + (isCorrect ? 'correct' : 'incorrect');
  feedback.innerHTML = `
    <div class="verdict">${isCorrect ? '✅ Correct !' : '❌ Incorrect'}</div>
    ${answerLine}
    <div class="explanation">${q.explanation}</div>
  `;

  card.dataset.checked = '1';
  card.dataset.correct = isCorrect ? '1' : '0';
  updateScore();
  return isCorrect;
}

function updateScore() {
  const cards = document.querySelectorAll('.card[data-checked="1"]');
  const correctCount = document.querySelectorAll('.card[data-correct="1"]').length;
  document.getElementById('scoreBox').textContent = `${cards.length} / 30 vérifiées — ${correctCount} correcte(s)`;
}

function checkAll() {
  QUESTIONS.forEach((q, idx) => checkQuestion(idx));
  const correctCount = document.querySelectorAll('.card[data-correct="1"]').length;
  const finalBox = document.getElementById('finalScore');
  finalBox.classList.add('show');
  document.getElementById('finalScoreText').textContent = `${correctCount} / 30`;
  finalBox.scrollIntoView({behavior:'smooth', block:'center'});
}

function resetAll() {
  quizEl.innerHTML = QUESTIONS.map((q, idx) => renderQuestion(q, idx)).join('');
  document.getElementById('finalScore').classList.remove('show');
  updateScore();
}

document.getElementById('checkAllBtn').addEventListener('click', checkAll);
document.getElementById('resetBtn').addEventListener('click', resetAll);

resetAll();
</script>
